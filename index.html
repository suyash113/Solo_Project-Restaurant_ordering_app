<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suyash's Restaurant Ordering App</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Smythe&family=Source<p>➕</p>Sans<p>➕</p>3:ital,wght@0,200..900;1,200..900&family=Source<p>➕</p>Serif<p>➕</p>4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="header-text">
            <h1>Suyash's Diner</h1>
            <h3>The best Marathi food in the world</h3>
        </div>
    </header>
    <main>
        <div class="pizza">
            <div class="pizza-info">
                <div class="img">🍕</div>
                <div class="info">
                    <h2>Pizza</h2>
                    <p>pepperoni,mushrom,mozarella</p>
                    <h3>$14</h3>
                </div>
            </div>
            <div class="plus" id="plus-pizza" data-name="Pizza" data-price="14">
                <p>➕</p>
            </div>
        </div>
        <div class="burger">
            <div class="burger-info">
                <div class="img">🍔</div>
                <div class="info">
                    <h2>Burger</h2>
                    <p>chicken, cheese, lettuce</p>
                    <h3>$12</h3>
                </div>
            </div>
            <div class="plus" id="plus-burger" data-name="Burger" data-price="12">
                <p>➕</p>
            </div>
        </div>
            <div class="beer">
    
            <div class="beer-info">
                <div class="img">🍺</div>
                <div class="info">
                    <h2>Beer</h2>
                    <p>grain, hops, yeast, water</p>
                    <h3>$10</h3>
                </div>
            </div>
            <div class="plus" id="plus-beer" data-name="Beer" data-price="10">
                <p>➕</p>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
